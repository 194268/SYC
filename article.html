<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DECODING...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Fira+Code&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css" id="hljs-style">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>

    <style>
        :root[data-theme="dark"] {
            --bg-deep: #050505; --bg-mid: #121212;
            --text-main: #e0e0e0; --text-dim: #666;
            --accent: #fff; --canvas-opacity: 0.8;
        }
        :root[data-theme="light"] {
            --bg-deep: #f0f0f0; --bg-mid: #ffffff;
            --text-main: #1a1a1a; --text-dim: #999;
            --accent: #000; --canvas-opacity: 0.4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.4s, color 0.3s; }

        body {
            background: linear-gradient(135deg, var(--bg-deep), var(--bg-mid), var(--bg-deep));
            background-size: 400% 400%;
            animation: metalFlow 20s ease infinite;
            color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.8; overflow-x: hidden;
        }

        @keyframes metalFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 背景 Canvas：使用主页同款流体效果 */
        #article-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; opacity: var(--canvas-opacity); }

        .theme-toggle {
            position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; border-radius: 50%;
            background: var(--accent); color: var(--bg-deep); border: none; cursor: pointer; z-index: 2000;
            display: flex; align-items: center; justify-content: center; font-family: 'Fira Code'; font-size: 10px;
        }

        #progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); width: 0%; z-index: 2000; }

        nav {
            padding: 20px 40px; backdrop-filter: blur(20px);
            position: sticky; top: 0; background: rgba(0,0,0,0.02); z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 11px; font-family: 'Fira Code'; letter-spacing: 1px; }
        nav a:hover { color: var(--accent); }

        /* 内容容器：去掉边框和背景色，实现无界感 */
        .content-wrapper {
            max-width: 900px; margin: 40px auto; padding: 40px 24px;
        }

        /* 标题区域 */
        .article-header { margin-bottom: 60px; text-align: left; }
        .article-header h1 {
            font-size: clamp(32px, 6vw, 56px); font-weight: 700; color: var(--accent);
            letter-spacing: -3px; line-height: 1.1; text-transform: uppercase;
        }

        /* Markdown 内容与图片防溢出 */
        .markdown-body img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            margin: 20px 0;
            display: block;
        }
        .markdown-body h2 { font-size: 26px; margin: 45px 0 20px; color: var(--accent); letter-spacing: -1px; }
        .markdown-body p { margin-bottom: 25px; opacity: 0.9; }
        .markdown-body pre { 
            background: rgba(0,0,0,0.3) !important; 
            padding: 24px; border: 1px solid var(--border); border-radius: 12px; 
            margin: 30px 0; overflow-x: auto; backdrop-filter: blur(5px);
        }
        .markdown-body code { font-family: 'Fira Code'; font-size: 14px; background: rgba(128,128,128,0.1); padding: 2px 6px; border-radius: 4px; }

        @media (max-width: 768px) { .content-wrapper { padding: 20px; } nav { padding: 15px 20px; } }
    </style>
</head>
<body>
    <div id="progress"></div>
    <canvas id="article-canvas"></canvas>
    
    <button class="theme-toggle" onclick="toggleTheme()">MODE</button>

    <nav>
        <a href="index.html"><- BACK_TO_TERMINAL</a>
        <span id="reading-id" style="font-family:'Fira Code'; font-size: 10px; color: var(--text-dim);">SYSTEM: OK</span>
    </nav>

    <main class="content-wrapper">
        <header class="article-header">
            <h1 id="article-title">INITIALIZING...</h1>
        </header>

        <article id="render-content" class="markdown-body">
            <div style="color: var(--text-dim); font-family: 'Fira Code';">DECODING_REMOTE_STREAM...</div>
        </article>
    </main>

    <script>
        // --- 1. 动态 Title 效果 (主页同款) ---
        let fullTitle = "DECODING...";
        let titleIdx = 0, isDel = false;
        function animateTitle() {
            document.title = isDel ? fullTitle.substring(0, titleIdx) : fullTitle.substring(0, titleIdx + 1);
            let speed = isDel ? 70 : 150;
            if (!isDel && titleIdx === fullTitle.length) { speed = 3000; isDel = true; }
            else if (isDel && titleIdx === 0) { isDel = false; }
            titleIdx = isDel ? titleIdx - 1 : titleIdx + 1;
            setTimeout(animateTitle, speed);
        }

        // --- 2. 主题切换 ---
        function toggleTheme() {
            const root = document.documentElement;
            const target = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            root.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            document.getElementById('hljs-style').href = target === 'dark' 
                ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css"
                : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github.min.css";
        }
        document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');

        // --- 3. 加载内容 & 设置标题 ---
        const urlParams = new URLSearchParams(window.location.search);
        const postName = urlParams.get('post');

        if (postName) {
            const cleanTitle = postName.replace('.md', '').replace(/-/g, ' ').toUpperCase();
            document.getElementById('article-title').innerText = cleanTitle;
            fullTitle = `<< ${cleanTitle} >>`; // 更新动态标题内容
            animateTitle(); // 启动标题动画

            fetch(`https://raw.githubusercontent.com/194268/SYC/main/posts/${postName}`)
                .then(res => res.text())
                .then(md => {
                    document.getElementById('render-content').innerHTML = marked.parse(md);
                    hljs.highlightAll();
                });
        }

        // --- 4. 动态背景 (流体光影) ---
        const canvas = document.getElementById('article-canvas');
        const ctx = canvas.getContext('2d');
        let fluidNodes = [];

        function initCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            fluidNodes = Array.from({length: 3}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * (canvas.width * 0.4) + canvas.width * 0.3
            }));
        }

        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; // 留一点点残影
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            ctx.globalCompositeOperation = isDark ? "lighter" : "multiply";

            fluidNodes.forEach(node => {
                node.x += node.vx; node.y += node.vy;
                if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
                if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

                const g = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, node.size);
                const color = isDark ? "30, 30, 30" : "220, 220, 220";
                g.addColorStop(0, `rgba(${color}, 0.4)`);
                g.addColorStop(1, "transparent");
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(node.x, node.y, node.size, 0, Math.PI*2); ctx.fill();
            });

            requestAnimationFrame(draw);
        }

        window.onscroll = () => {
            const winScroll = document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById("progress").style.width = (winScroll / height) * 100 + "%";
        };

        window.addEventListener('resize', initCanvas);
        initCanvas();
        draw();
    </script>
</body>
</html>
