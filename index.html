<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>未来至上</title>
  <script>
    // 动态 title 渐变闪烁
    const titles = ["技术博客 | 未来感至上", "Tech Blog | Future First", "精致黑白 | 动态交互"];
    let index = 0;

    setInterval(() => {
      document.title = titles[index];
      index = (index + 1) % titles.length;
    }, 1200); // 切换速度，毫秒
  </script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Fira+Code&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="hero-canvas"></canvas>
    
    <nav class="glass-nav">
        <div class="nav-inner">
            <span class="logo">SOURCE_CODE</span>
            <div class="links">
                <a href="#">ARCHIVE</a>
                <a href="https://github.com/你的用户名" target="_blank">GITHUB</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="hero-section">
            <h1 class="glitch-text" data-text="EVOLVING_LOGIC">EVOLVING_LOGIC</h1>
            <p class="subtitle">// 纯粹技术分享 / 边缘计算与未来</p>
        </header>

        <div id="article-list" class="post-grid">
            <div class="loading">SYSTEM.INITIALIZING...</div>
        </div>
    </main>

    <script>
        // 自动化逻辑：获取 GitHub 仓库内容
        // 替换为你的 GitHub 用户名和仓库名
        const GITHUB_USER = '194268'; 
        const REPO_NAME = 'SYC';

        async function fetchPosts() {
            const listContainer = document.getElementById('article-list');
            try {
                // 调用 GitHub API 获取 posts 目录下的文件列表
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/posts`);
                const files = await response.json();

                listContainer.innerHTML = ''; // 清除 loading

                files.filter(file => file.name.endsWith('.md')).forEach(file => {
                    const title = file.name.replace('.md', '').replace(/-/g, ' ').toUpperCase();
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `
                        <div class="card-tag">ARTICLE</div>
                        <h2>${title}</h2>
                        <p>点击进入系统协议读取该加密文档...</p>
                        <a href="article.html?post=${file.name}" class="enter-link">READ_MORE_</a>
                    `;
                    listContainer.appendChild(card);
                });
            } catch (e) {
                listContainer.innerHTML = '<div class="error">FAILED TO CONNECT TO DATABASE.</div>';
            }
        }
        fetchPosts();

        // 首页背景：矩阵噪点效果
        const canvas = document.getElementById('hero-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawNoise() {
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const val = Math.random() * 255;
                data[i] = data[i+1] = data[i+2] = val;
                data[i+3] = 15; // 极低透明度的噪点
            }
            ctx.putImageData(imageData, 0, 0);
            requestAnimationFrame(drawNoise);
        }
        drawNoise();
    </script>
</body>
</html>
